<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fantasías Heladas — Clientes potenciales</title>
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <img src="assets/logo.png" alt="Fantasías Heladas" onerror="this.src='assets/logo-placeholder.svg'" />
        <span>Fantasías<br/>Heladas CRM</span>
      </div>
      <nav>
        <a href="dashboard.html">📊 Resumen</a>
        <a href="pipeline.html">🔁 Pipeline</a>
        <a href="fuentes.html">📡 Fuentes</a>
        <a href="leads.html" class="active">🧾 Leads</a>
        <a href="seguimientos.html">🗓 Seguimientos</a>
      </nav>
      <button class="logout-btn" onclick="abrirModalSync()" style="margin-bottom:8px">🔗 Sincronizar</button>
      <button class="logout-btn" onclick="cerrarSesion()">⎋ Cerrar sesión</button>
    </aside>
    <div class="sidebar-backdrop" id="sidebarBackdrop" onclick="toggleSidebar()"></div>

    <main class="main">
      <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
      <div class="topbar">
        <div>
          <h1>Clientes potenciales</h1>
          <p>Agrega, edita o elimina registros del CRM</p>
        </div>
        <button class="btn btn-primary" style="width:auto" onclick="abrirModalNuevo()">+ Nuevo cliente potencial</button>
      </div>

      <div class="table-wrap">
        <div class="table-toolbar">
          <input type="text" id="buscador" placeholder="Buscar por cliente..." style="min-width:240px" />
          <div class="filtros">
            <select id="filtroEstado"><option value="">Todos los estados</option></select>
            <select id="filtroFuente"><option value="">Todas las fuentes</option></select>
            <select id="filtroPrioridad"><option value="">Toda prioridad</option></select>
          </div>
        </div>
        <table>
          <thead>
            <tr>
              <th>Cliente</th>
              <th>Producto</th>
              <th>Estado</th>
              <th>Valor (USD)</th>
              <th>Fuente</th>
              <th>Prioridad</th>
              <th>Seguimiento</th>
              <th>Notas</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaBody"></tbody>
        </table>
        <div class="pagination" id="paginacion"></div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2 id="modalTitulo">Nuevo cliente potencial</h2>
      <form id="leadForm">
        <input type="hidden" id="leadId" />
        <div class="grid-form">
          <div class="campo full">
            <label>Cliente</label>
            <input type="text" id="fCliente" required />
          </div>
          <div class="campo">
            <label>Teléfono</label>
            <input type="text" id="fTelefono" />
          </div>
          <div class="campo">
            <label>Producto</label>
            <select id="fProducto"></select>
          </div>
          <div class="campo">
            <label>Estado</label>
            <select id="fEstado"></select>
          </div>
          <div class="campo">
            <label>Valor estimado (USD)</label>
            <input type="number" id="fValorUsd" min="0" step="1" required />
          </div>
          <div class="campo">
            <label>Fuente</label>
            <select id="fFuente"></select>
          </div>
          <div class="campo">
            <label>Prioridad</label>
            <select id="fPrioridad"></select>
          </div>
          <div class="campo">
            <label>Fecha de seguimiento</label>
            <input type="date" id="fFechaSeguimiento" />
          </div>
          <div class="campo full">
            <label>Notas</label>
            <textarea id="fNotas" rows="3"></textarea>
          </div>
        </div>
        <div class="modal-acciones">
          <button type="button" class="btn btn-secondary" onclick="cerrarModal()">Cancelar</button>
          <button type="submit" class="btn btn-primary" style="width:auto">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-overlay" id="syncModalOverlay">
    <div class="modal">
      <h2>Sincronizar con Google Sheets</h2>
      <div class="campo full">
        <label>URL de tu Apps Script (Web App)</label>
        <input type="text" id="syncUrlInput" placeholder="https://script.google.com/macros/s/..." />
      </div>
      <div class="modal-acciones" style="justify-content:space-between;align-items:center">
        <button type="button" class="btn btn-secondary" onclick="guardarUrlSync()">Guardar URL</button>
        <div style="display:flex;gap:8px">
          <button type="button" class="btn btn-secondary" onclick="traerDeSheets()">⬇ Traer de Sheets</button>
          <button type="button" class="btn btn-primary" style="width:auto" onclick="subirASheets()">⬆ Subir a Sheets</button>
        </div>
      </div>
      <p id="syncEstado" style="font-size:13px;color:#6e6480;margin-top:12px"></p>
      <p id="syncUltima" style="font-size:12px;color:#9890ad"></p>
      <div style="text-align:right;margin-top:10px">
        <button type="button" class="btn btn-secondary" onclick="cerrarModalSync()">Cerrar</button>
      </div>
    </div>
  </div>

  <script src="js/data.js?v=4"></script>
  <script src="js/store.js?v=4"></script>
  <script src="js/auth.js?v=4"></script>
  <script>protegerPagina();</script>
  <script src="js/ui.js?v=4"></script>
  <script src="js/sheetsSync.js?v=4"></script>
  <script src="js/leads.js?v=4"></script>
</body>
</html>
